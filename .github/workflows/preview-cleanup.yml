name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          if [ -d "preview/${{ github.event.pull_request.number }}" ]; then
            rm -rf "preview/${{ github.event.pull_request.number }}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "cleanup: remove preview for PR #${{ github.event.pull_request.number }}"
            git push
          else
            echo "No preview directory found — nothing to clean up."
          fi
