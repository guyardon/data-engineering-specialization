name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build preview
        env:
          SITE_BASE: /data-engineering-specialization/preview/${{ github.event.pull_request.number }}
        run: npm run build

      - name: Deploy preview to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          target-folder: preview/${{ github.event.pull_request.number }}

      - name: Comment preview URL on PR
        uses: thollander/actions-comment-pull-request@v3
        with:
          comment-tag: preview-url
          message: |
            :rocket: **Preview deployed!**
            https://guyardon.github.io/data-engineering-specialization/preview/${{ github.event.pull_request.number }}/
