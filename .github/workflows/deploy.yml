name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      fetch_notion:
        description: "Fetch latest content from Notion before building"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch Notion content
        if: github.event_name == 'workflow_dispatch' && inputs.fetch_notion
        run: node scripts/fetch-notion.mjs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

      - name: Build site
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean-exclude: preview
